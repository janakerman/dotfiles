add_newline = false

format = """
$directory\
$git_branch\
$git_status\
$golang\
$python\
$nodejs\
$character
"""

[directory]
style = "blue"
truncate_to_repo = true
truncation_length = 3

[git_branch]
symbol = " "
style = "purple"

[git_status]
style = "red"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "cyan"

[python]
symbol = " "
format = "[$symbol($version )]($style)"
style = "yellow"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "green"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"